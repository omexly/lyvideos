<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | KSAD LY Premium</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Admin specific overrides & designs */
    .admin-container {
      max-width: 1400px;
      width: 100%;
      margin: 30px auto;
      padding: 0 20px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 20px;
    }

    .admin-title {
      font-size: 1.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
    }

    .stat-info h4 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .stat-info .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .stat-icon {
      font-size: 2.2rem;
      opacity: 0.8;
      background: var(--primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-icon.red {
      background: var(--danger);
      -webkit-background-clip: text;
    }

    .stat-icon.gold {
      background: var(--vip-gradient);
      -webkit-background-clip: text;
    }

    .admin-content-grid {
      display: grid;
      grid-template-columns: 1fr 450px;
      gap: 25px;
    }

    @media (max-width: 1024px) {
      .admin-content-grid {
        grid-template-columns: 1fr;
      }
    }

    .table-container {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: right;
    }

    .admin-table th {
      padding: 14px;
      border-bottom: 2px solid var(--card-border);
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .admin-table td {
      padding: 14px;
      border-bottom: 1px solid var(--card-border);
      font-size: 0.9rem;
    }

    .admin-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .action-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .action-badge.danger {
      background: rgba(244, 63, 94, 0.15);
      color: #f43f5e;
      border: 1px solid rgba(244, 63, 94, 0.3);
    }

    .action-badge.success {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    /* Ban and Quick actions form */
    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-group input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-main);
      outline: none;
      font-family: inherit;
    }

    .input-group input:focus {
      border-color: var(--secondary);
    }

    .toast-notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--primary-solid);
      border-radius: 8px;
      padding: 15px 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }

    .toast-notification.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-notification.danger {
      border-left-color: #f43f5e;
    }
  </style>
</head>
<body>

  <!-- Background Animated Gradients -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Admin Main Wrapper -->
  <div class="admin-container">
    
    <!-- Admin Header -->
    <header class="admin-header">
      <div class="admin-title">
        <i class="fa-solid fa-user-shield text-warning"></i>
        <span>لوحة التحكم للمدير</span>
      </div>
      <div>
        <a href="/" class="btn-secondary"><i class="fa-solid fa-house"></i> العودة للموقع الرئيسي</a>
      </div>
    </header>

    <!-- Stats Row -->
    <section class="admin-stats-grid">
      <div class="stat-card">
        <div class="stat-info">
          <h4>المتصلون الآن</h4>
          <div class="stat-value" id="stats-online">0</div>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
      </div>
      
      <div class="stat-card">
        <div class="stat-info">
          <h4>المحادثات النشطة</h4>
          <div class="stat-value" id="stats-rooms">0</div>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-video"></i></div>
      </div>
      
      <div class="stat-card">
        <div class="stat-info">
          <h4>المسجلون الكلي</h4>
          <div class="stat-value" id="stats-registered">0</div>
        </div>
        <div class="stat-icon gold"><i class="fa-solid fa-user-check"></i></div>
      </div>
      
      <div class="stat-card">
        <div class="stat-info">
          <h4>بلاغات غير معالجة</h4>
          <div class="stat-value" id="stats-reports">0</div>
        </div>
        <div class="stat-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
      </div>
    </section>

    <!-- Dashboard Main Grid -->
    <div class="admin-content-grid">
      
      <!-- Reports Management Table -->
      <section class="card">
        <div class="card-header">
          <h3><i class="fa-solid fa-flag text-danger"></i> بلاغات وشكاوي المستخدمين الحالية</h3>
        </div>
        <div class="card-body table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>المُبلغ</th>
                <th>المُبلغ عنه (المتهم)</th>
                <th>السبب</th>
                <th>الوقت</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="reports-list">
              <!-- Dynamically populated -->
              <tr>
                <td colspan="5" style="text-align: center; color: var(--text-muted);">لا توجد بلاغات حالياً.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Quick Actions Panel (Ban / Manage Users) -->
      <aside class="sidebar-section">
        <!-- User Search & Quick Ban/Unban -->
        <div class="card">
          <div class="card-header">
            <h3><i class="fa-solid fa-user-gear"></i> إدارة سريعة للمستخدمين</h3>
          </div>
          <div class="card-body quick-actions">
            
            <div class="filter-group">
              <label>حظر مستخدم (Ban):</label>
              <div class="input-group">
                <input type="text" id="ban-username" placeholder="اسم المستخدم المراد حظره">
                <button id="ban-submit-btn" class="btn-danger"><i class="fa-solid fa-ban"></i> حظر</button>
              </div>
            </div>

            <div class="filter-group" style="margin-top: 10px;">
              <label>إلغاء حظر مستخدم (Unban):</label>
              <div class="input-group">
                <input type="text" id="unban-username" placeholder="اسم المستخدم لإلغاء حظره">
                <button id="unban-submit-btn" class="btn-success"><i class="fa-solid fa-user-check"></i> إلغاء الحظر</button>
              </div>
            </div>
            
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-notification" id="toast">
    <i class="fa-solid fa-circle-check toast-icon"></i>
    <span id="toast-message">تمت العملية بنجاح!</span>
  </div>

  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Admin Script -->
  <script src="admin.js"></script>
</body>
</html>
